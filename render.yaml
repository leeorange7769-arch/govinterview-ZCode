services:
  - type: web
    name: civil-interview-backend
    runtime: node
    buildCommand: cd backend && npm ci && npx prisma generate && npx prisma migrate deploy && npx tsx prisma/seed.ts
    startCommand: cd backend && npx tsx src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        value: file:./data/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        fromService:
          name: civil-interview-frontend
          type: web
          property: url
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
    healthCheckPath: /api/health

  - type: web
    name: civil-interview-frontend
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npx serve -s dist -l 3000
    envVars:
      - key: VITE_API_URL
        fromService:
          name: civil-interview-backend
          type: web
          property: url
