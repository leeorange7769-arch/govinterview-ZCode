# ============================================
# Docker Compose 编排
# 启动：docker compose up -d
# 停止：docker compose down
# 查看日志：docker compose logs -f
# ============================================
version: "3.9"

services:
  # ---- 后端 API 服务 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civil-interview-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/dev.db
    volumes:
      # 持久化 SQLite 数据库文件
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ---- 前端 Nginx 服务 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civil-interview-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

volumes:
  backend-data:
    driver: local

networks:
  app-network:
    driver: bridge
